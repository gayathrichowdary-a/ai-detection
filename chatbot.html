<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection AI Chatbot</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        #chatBox {
            border: 1px solid #ccc;
            height: 350px;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        #userInput {
            width: 80%;
            padding: 8px;
        }
        button {
            padding: 8px 15px;
        }
    </style>
</head>

<body>

<h2>🤖 Fraud Detection AI Chatbot</h2>

<div id="chatBox"></div>

<!-- ⚠️ NOT inside a <form> -->
<input type="text" id="userInput" placeholder="Ask something..." />
<button type="button" onclick="sendMessage()">Send</button>

<script>
function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();

    if (message === "") {
        alert("Type something first");
        return;
    }

    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML += `<div style="color:blue"><b>You:</b> ${message}</div>`;

    fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: message })
    })
    .then(response => response.json())
    .then(data => {
        chatBox.innerHTML += `<div style="color:green"><b>Bot:</b> ${data.reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    })
    .catch(error => {
        chatBox.innerHTML += `<div style="color:red">Error connecting to chatbot</div>`;
    });

    input.value = "";
}
</script>

</body>
</html>
