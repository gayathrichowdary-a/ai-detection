<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Fraud Detection AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#4f46e5,#7c3aed);
}

.container{
width:900px;
height:500px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
display:flex;
align-items:center;
justify-content:space-between;
padding:40px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.left img{
width:320px;
}

.right{
width:320px;
color:white;
}

.right h2{
margin-bottom:10px;
}

.right p{
margin-bottom:20px;
opacity:.8;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#3b82f6,#6366f1);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.signup{
margin-top:10px;
font-size:14px;
}

.signup a{
color:#93c5fd;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="left">
<img src="{{ url_for('static', filename='login.png.jpg') }}">
</div>

<div class="right">

<h2>Fraud Detection AI</h2>
<p>Secure Login Portal</p>

<form method="GET" action="/dashboard">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Sign In</button>

</form>

<div class="signup">
New user? <a href="/signup">Create Account</a>
</div>

</div>
</div>

</body>
</html>
