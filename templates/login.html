<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Fraud Detection AI</title>
<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, sans-serif;
}
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(120deg, #f6f4f2, #f9f7f5);
    display: flex;
    justify-content: center;
    align-items: center;
}
.login-card {
    background: white;
    width: 360px;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    text-align: center;
}
input, button {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
}
button {
    background: #22c55e;
    color: white;
    border: none;
    cursor: pointer;
}
.signup a {
    color: #2563eb;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="login-card">
    <h2>Fraud Detection AI</h2>
    <p>Secure Login Portal</p>
    <form method="GET" action="/dashboard">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p class="signup">
        New user? <a href="/signup">Create account</a>
    </p>
</div>

</body>
</html>
