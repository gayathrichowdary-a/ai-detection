<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up | FraudShield AI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--surface:#0d1424;--border:rgba(99,179,255,0.12);--accent:#3b82f6;--accent2:#06b6d4;--text:#e2e8f0;--text-dim:#64748b;--text-muted:#334155;--success:#10b981;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.05) 1px,transparent 1px);background-size:40px 40px;animation:gridMove 20s linear infinite;}
@keyframes gridMove{0%{background-position:0 0;}100%{background-position:40px 40px;}}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;}
.orb1{width:500px;height:500px;background:rgba(59,130,246,0.12);top:-150px;left:-100px;animation:orbFloat 8s ease-in-out infinite;}
.orb2{width:400px;height:400px;background:rgba(6,182,212,0.08);bottom:-100px;right:-50px;animation:orbFloat 10s ease-in-out infinite reverse;}
@keyframes orbFloat{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-30px);}}
.card{position:relative;z-index:10;width:420px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;box-shadow:0 30px 80px rgba(0,0,0,0.5);animation:cardIn 0.6s cubic-bezier(0.16,1,0.3,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(59,130,246,0.4);}
.logo-text{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;}
h2{font-family:'Space Mono',monospace;font-size:20px;margin-bottom:5px;}
.sub{font-size:13px;color:var(--text-dim);margin-bottom:26px;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.form-group label{font-size:11px;color:var(--text-dim);font-family:'Space Mono',monospace;letter-spacing:0.1em;}
.form-group input{background:#111827;border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.12);}
.form-group input::placeholder{color:var(--text-muted);}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:all 0.2s;box-shadow:0 4px 16px rgba(59,130,246,0.35);}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,0.5);}
.login-link{text-align:center;font-size:13px;color:var(--text-dim);margin-top:18px;}
.login-link a{color:var(--accent);text-decoration:none;font-weight:600;}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#ef4444;margin-bottom:14px;}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div class="card">
  <div class="logo"><div class="logo-icon">🧠</div><div class="logo-text">FRAUDSHIELD AI</div></div>
  <h2>Create Account</h2>
  <p class="sub">Join the fraud intelligence platform</p>
  {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
  <form action="/signup" method="POST">
    <div class="form-group"><label>EMAIL ADDRESS</label><input type="email" name="email" placeholder="you@example.com" required></div>
    <div class="form-group"><label>PASSWORD</label><input type="password" name="password" placeholder="Create a strong password" required></div>
    <button type="submit" class="btn">🚀 Create Account</button>
  </form>
  <div class="login-link">Already have an account? <a href="/login">Sign In</a></div>
</div>
</body>
</html>
