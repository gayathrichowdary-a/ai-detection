<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Assistant | FraudShield</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c14;--surface:#0d1424;--surface2:#111827;
  --border:rgba(99,179,255,0.12);--accent:#3b82f6;--accent2:#06b6d4;
  --danger:#ef4444;--success:#10b981;--text:#e2e8f0;
  --text-dim:#64748b;--text-muted:#334155;--ai:#a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

/* HEADER */
.header{position:relative;z-index:10;background:rgba(8,12,20,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header-left{display:flex;align-items:center;gap:12px;}
.back-btn{display:flex;align-items:center;gap:5px;color:var(--text-dim);text-decoration:none;font-size:12px;font-family:'Space Mono',monospace;padding:5px 10px;border:1px solid var(--border);border-radius:6px;transition:all 0.2s;}
.back-btn:hover{color:var(--accent);border-color:rgba(59,130,246,0.3);}
.bot-info{display:flex;align-items:center;gap:10px;}
.bot-avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--ai),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 14px rgba(167,139,250,0.4);}
.bot-name{font-weight:600;font-size:13px;}
.bot-status{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--success);font-family:'Space Mono',monospace;}
.sdot{width:6px;height:6px;background:var(--success);border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 5px var(--success);}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
.ai-badge{font-size:10px;background:linear-gradient(135deg,rgba(167,139,250,0.15),rgba(59,130,246,0.15));border:1px solid rgba(167,139,250,0.3);color:var(--ai);padding:3px 10px;border-radius:20px;font-family:'Space Mono',monospace;}
.clock{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted);}

/* CHAT AREA */
.chat-area{position:relative;z-index:1;flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:3px;}

/* MESSAGES */
.msg-row{display:flex;gap:10px;align-items:flex-start;animation:msgIn 0.3s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg-row.user{flex-direction:row-reverse;}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.msg-av.bot{background:linear-gradient(135deg,var(--ai),var(--accent));box-shadow:0 0 10px rgba(167,139,250,0.3);}
.msg-av.user-av{background:var(--surface2);border:1px solid var(--border);}
.msg-bubble{max-width:68%;padding:11px 15px;border-radius:14px;font-size:13px;line-height:1.65;}
.msg-bubble.bot{background:var(--surface2);border:1px solid var(--border);border-top-left-radius:4px;}
.msg-bubble.user{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border-top-right-radius:4px;}
.msg-bubble b,.msg-bubble strong{color:white;}
.msg-bubble.bot b,.msg-bubble.bot strong{color:var(--text);}
.msg-time{font-size:9px;color:var(--text-muted);font-family:'Space Mono',monospace;margin-top:3px;padding:0 3px;}
.typing{display:flex;gap:4px;align-items:center;padding:11px 15px;}
.typing span{width:6px;height:6px;background:var(--ai);border-radius:50%;animation:bounce 1.2s ease-in-out infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.5;}30%{transform:translateY(-7px);opacity:1;}}

/* WELCOME */
.welcome{text-align:center;padding:28px 20px;color:var(--text-dim);}
.welcome-icon{font-size:44px;display:block;margin-bottom:12px;filter:drop-shadow(0 0 16px rgba(167,139,250,0.5));animation:float 4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.welcome-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px;}
.welcome-sub{font-size:12px;line-height:1.6;}
.ai-powered-badge{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;background:linear-gradient(135deg,rgba(167,139,250,0.12),rgba(59,130,246,0.12));border:1px solid rgba(167,139,250,0.25);color:var(--ai);padding:5px 14px;border-radius:20px;font-family:'Space Mono',monospace;}

/* SUGGESTIONS */
.suggestions{display:flex;flex-wrap:wrap;gap:7px;padding:0 24px 10px;position:relative;z-index:1;}
.sug-btn{padding:5px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text-dim);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;}
.sug-btn:hover{background:rgba(167,139,250,0.1);color:var(--ai);border-color:rgba(167,139,250,0.3);}

/* INPUT BAR */
.input-bar{position:relative;z-index:10;background:rgba(8,12,20,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
#userInput{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
#userInput:focus{border-color:var(--ai);box-shadow:0 0 0 3px rgba(167,139,250,0.1);}
#userInput::placeholder{color:var(--text-muted);}
.send-btn{width:42px;height:42px;background:linear-gradient(135deg,var(--ai),var(--accent));border:none;border-radius:10px;color:white;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 4px 12px rgba(167,139,250,0.3);flex-shrink:0;}
.send-btn:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(167,139,250,0.5);}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a href="/dashboard" class="back-btn">← Back</a>
    <div class="bot-info">
      <div class="bot-avatar">🤖</div>
      <div>
        <div class="bot-name">FraudShield Assistant</div>
        <div class="bot-status"><span class="sdot"></span> Claude AI · Online</div>
      </div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="ai-badge">⚡ Powered by Claude</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="chat-area" id="chatArea">
  <div class="welcome">
    <span class="welcome-icon">🛡️</span>
    <div class="welcome-title">FraudShield AI Assistant</div>
    <div class="welcome-sub">Powered by Claude AI — Ask anything about fraud detection,<br>your transactions, risk scores, or financial safety.</div>
    <div class="ai-powered-badge">✨ Generative AI · Real-time Analysis</div>
  </div>
</div>

<div class="suggestions" id="suggestions">
  <button class="sug-btn" onclick="quickSend('What is fraud detection and how does it work?')">How does fraud detection work?</button>
  <button class="sug-btn" onclick="quickSend('How is the risk score calculated?')">Risk score explained</button>
  <button class="sug-btn" onclick="quickSend('Why was my last transaction flagged?')">Why was my transaction flagged?</button>
  <button class="sug-btn" onclick="quickSend('Give me tips to prevent online fraud in India')">Fraud prevention tips</button>
  <button class="sug-btn" onclick="quickSend('What are the most common types of financial fraud?')">Common fraud types</button>
</div>

<div class="input-bar">
  <input type="text" id="userInput" placeholder="Ask about fraud, transactions, risk scores..." />
  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN',{hour12:false});
}
setInterval(updateClock,1000); updateClock();

document.getElementById('userInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});

function getTime(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});}

function appendMsg(text, role) {
  const area = document.getElementById('chatArea');
  const isBot = role==='bot';
  const row = document.createElement('div');
  row.className = `msg-row ${isBot?'':'user'}`;
  row.innerHTML = `
    <div class="msg-av ${isBot?'bot':'user-av'}">${isBot?'🤖':'👤'}</div>
    <div>
      <div class="msg-bubble ${isBot?'bot':'user'}">${text}</div>
      <div class="msg-time">${getTime()}</div>
    </div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className='msg-row'; row.id='typingRow';
  row.innerHTML = `<div class="msg-av bot">🤖</div><div class="msg-bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>`;
  area.appendChild(row); area.scrollTop=area.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typingRow');if(t)t.remove();}

function quickSend(text){
  document.getElementById('userInput').value=text;
  sendMessage();
  document.getElementById('suggestions').style.display='none';
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const message = input.value.trim();
  if (!message) return;
  appendMsg(message,'user');
  input.value='';
  document.getElementById('suggestions').style.display='none';
  showTyping();
  try {
    const r = await fetch('/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message})
    });
    const data = await r.json();
    removeTyping();
    appendMsg(data.reply||'Sorry, could not process that.','bot');
  } catch(e) {
    removeTyping();
    appendMsg('⚠️ Connection error. Please try again.','bot');
  }
}
</script>
</body>
</html>
