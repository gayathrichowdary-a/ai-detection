<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Assistant | FraudShield</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --surface: #0d1424;
  --surface2: #111827;
  --border: rgba(99,179,255,0.12);
  --accent: #3b82f6;
  --accent2: #06b6d4;
  --danger: #ef4444;
  --success: #10b981;
  --text: #e2e8f0;
  --text-dim: #64748b;
  --text-muted: #334155;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
.header {
  position: relative;
  z-index: 10;
  background: rgba(8,12,20,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 30px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 13px;
  font-family: 'Space Mono', monospace;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  transition: all 0.2s;
}

.back-btn:hover {
  color: var(--accent);
  border-color: rgba(59,130,246,0.3);
}

.bot-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.bot-avatar {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 16px rgba(59,130,246,0.4);
}

.bot-name {
  font-weight: 600;
  font-size: 14px;
}

.bot-status {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--success);
  font-family: 'Space Mono', monospace;
}

.status-dot {
  width: 7px; height: 7px;
  background: var(--success);
  border-radius: 50%;
  animation: pulse 2s infinite;
  box-shadow: 0 0 6px var(--success);
}

@keyframes pulse {
  0%, 100% { opacity:1; transform:scale(1); }
  50%       { opacity:0.5; transform:scale(0.8); }
}

.header-right {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
}

/* CHAT AREA */
.chat-area {
  position: relative;
  z-index: 1;
  flex: 1;
  overflow-y: auto;
  padding: 24px 30px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

/* MESSAGES */
.msg-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  animation: msgIn 0.3s ease;
}

@keyframes msgIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}

.msg-row.user {
  flex-direction: row-reverse;
}

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.msg-avatar.bot {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  box-shadow: 0 0 12px rgba(59,130,246,0.3);
}

.msg-avatar.user-av {
  background: var(--surface2);
  border: 1px solid var(--border);
}

.msg-bubble {
  max-width: 65%;
  padding: 12px 16px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.6;
}

.msg-bubble.bot {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
}

.msg-bubble.user {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border-top-right-radius: 4px;
}

.msg-time {
  font-size: 10px;
  color: var(--text-muted);
  font-family: 'Space Mono', monospace;
  margin-top: 4px;
  padding: 0 4px;
}

/* TYPING INDICATOR */
.typing {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 12px 16px;
}

.typing span {
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: typingBounce 1.2s ease-in-out infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity:0.5; }
  30%            { transform: translateY(-8px); opacity:1; }
}

/* SUGGESTIONS */
.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 30px 12px;
  position: relative;
  z-index: 1;
}

.suggest-btn {
  padding: 6px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-dim);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}

.suggest-btn:hover {
  background: rgba(59,130,246,0.1);
  color: var(--accent);
  border-color: rgba(59,130,246,0.3);
}

/* INPUT BAR */
.input-bar {
  position: relative;
  z-index: 10;
  background: rgba(8,12,20,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 16px 30px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.input-wrap {
  flex: 1;
  position: relative;
}

#userInput {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 18px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#userInput:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}

#userInput::placeholder { color: var(--text-muted); }

.send-btn {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(59,130,246,0.3);
  flex-shrink: 0;
}

.send-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(59,130,246,0.5);
}

/* WELCOME */
.welcome-msg {
  text-align: center;
  padding: 30px 20px;
  color: var(--text-dim);
}

.welcome-icon { font-size: 48px; display:block; margin-bottom:14px; }
.welcome-title { font-size:17px; font-weight:600; color:var(--text); margin-bottom:8px; }
.welcome-sub { font-size:13px; line-height:1.6; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <a href="/dashboard" class="back-btn">← Dashboard</a>
    <div class="bot-info">
      <div class="bot-avatar">🤖</div>
      <div>
        <div class="bot-name">FraudShield Assistant</div>
        <div class="bot-status"><span class="status-dot"></span> Online · Ready</div>
      </div>
    </div>
  </div>
  <div class="header-right" id="clock">--:--:--</div>
</header>

<!-- CHAT AREA -->
<div class="chat-area" id="chatArea">
  <div class="welcome-msg">
    <span class="welcome-icon">🛡️</span>
    <div class="welcome-title">FraudShield AI Assistant</div>
    <div class="welcome-sub">Ask me anything about fraud detection, transaction risks,<br>or how to interpret your analytics.</div>
  </div>
</div>

<!-- QUICK SUGGESTIONS -->
<div class="suggestions" id="suggestions">
  <button class="suggest-btn" onclick="quickSend('What is fraud detection?')">What is fraud detection?</button>
  <button class="suggest-btn" onclick="quickSend('How is risk score calculated?')">How is risk score calculated?</button>
  <button class="suggest-btn" onclick="quickSend('What makes a transaction suspicious?')">What makes a transaction suspicious?</button>
  <button class="suggest-btn" onclick="quickSend('Tips to avoid fraud')">Tips to avoid fraud</button>
</div>

<!-- INPUT BAR -->
<div class="input-bar">
  <div class="input-wrap">
    <input type="text" id="userInput" placeholder="Ask about fraud detection, risk scores, transactions..." />
  </div>
  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
// Clock
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-IN', { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

// Enter key
document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

function getTime() {
  return new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });
}

function appendMessage(text, role) {
  const area = document.getElementById('chatArea');
  const isBot = role === 'bot';
  const row = document.createElement('div');
  row.className = `msg-row ${isBot ? '' : 'user'}`;
  row.innerHTML = `
    <div class="msg-avatar ${isBot ? 'bot' : 'user-av'}">${isBot ? '🤖' : '👤'}</div>
    <div>
      <div class="msg-bubble ${isBot ? 'bot' : 'user'}">${text}</div>
      <div class="msg-time">${getTime()}</div>
    </div>
  `;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.id = 'typingRow';
  row.innerHTML = `
    <div class="msg-avatar bot">🤖</div>
    <div class="msg-bubble bot">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>
  `;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingRow');
  if (t) t.remove();
}

function quickSend(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
  document.getElementById('suggestions').style.display = 'none';
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const message = input.value.trim();
  if (!message) return;

  appendMessage(message, 'user');
  input.value = '';
  document.getElementById('suggestions').style.display = 'none';
  showTyping();

  fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message })
  })
  .then(r => r.json())
  .then(data => {
    removeTyping();
    appendMessage(data.reply || 'Sorry, I could not process that.', 'bot');
  })
  .catch(() => {
    removeTyping();
    appendMessage('⚠️ Connection error. Please try again.', 'bot');
  });
}
</script>
</body>
</html>
