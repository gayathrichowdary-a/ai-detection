<!DOCTYPE html>
<html>
<head>
<title>Fraud Detection AI</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#6a5cff,#6c2bd9);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#6a5cff;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Fraud Detection AI</h2>

<input type="text" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Sign In</button>

</div>

<script>

function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

if(email=="admin@gmail.com" && password=="1234")
{
window.location.href="dashboard.html";
}
else
{
alert("Invalid Login");
}

}

</script>

</body>
</html>
