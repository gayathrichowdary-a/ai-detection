<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transaction History | FraudShield</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c14; --surface:#0d1424; --surface2:#111827;
  --border:rgba(99,179,255,0.12); --accent:#3b82f6; --accent2:#06b6d4;
  --danger:#ef4444; --warn:#f59e0b; --success:#10b981;
  --text:#e2e8f0; --text-dim:#64748b; --text-muted:#334155;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }

/* HEADER */
.header { position:sticky; top:0; z-index:100; background:rgba(8,12,20,0.9); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 30px; height:64px; display:flex; align-items:center; justify-content:space-between; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:36px; height:36px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 0 20px rgba(59,130,246,0.4); }
.logo-text { font-family:'Space Mono',monospace; font-size:13px; font-weight:700; }
.logo-sub { font-size:10px; color:var(--text-dim); font-family:'Space Mono',monospace; }
.header-right { display:flex; align-items:center; gap:10px; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border:none; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif; transition:all 0.2s; text-decoration:none; }
.btn-back { background:var(--surface2); color:var(--text-dim); border:1px solid var(--border); }
.btn-back:hover { color:var(--accent); border-color:rgba(59,130,246,0.3); }
.btn-csv { background:rgba(16,185,129,0.12); color:var(--success); border:1px solid rgba(16,185,129,0.25); }
.btn-csv:hover { background:rgba(16,185,129,0.22); }

/* MAIN */
.main { position:relative; z-index:1; max-width:1000px; margin:0 auto; padding:30px 24px; }

/* PAGE TITLE */
.page-title { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.page-title h2 { font-family:'Space Mono',monospace; font-size:18px; font-weight:700; display:flex; align-items:center; gap:10px; }
.page-title-sub { font-size:12px; color:var(--text-dim); font-family:'Space Mono',monospace; margin-top:4px; }

/* SUMMARY CARDS */
.summary-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
.sum-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; }
.sum-label { font-size:10px; color:var(--text-dim); font-family:'Space Mono',monospace; letter-spacing:0.1em; margin-bottom:6px; }
.sum-value { font-size:24px; font-weight:700; font-family:'Space Mono',monospace; }

/* TABLE PANEL */
.panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.panel-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.panel-title { font-size:13px; font-weight:600; font-family:'Space Mono',monospace; }
.panel-badge { font-size:10px; background:rgba(59,130,246,0.12); color:var(--accent); border:1px solid rgba(59,130,246,0.25); padding:2px 8px; border-radius:20px; font-family:'Space Mono',monospace; }

/* TABLE */
table { width:100%; border-collapse:collapse; }
thead tr { background:rgba(59,130,246,0.06); }
th { padding:12px 20px; text-align:left; font-size:10px; font-family:'Space Mono',monospace; color:var(--text-dim); letter-spacing:0.1em; text-transform:uppercase; font-weight:600; border-bottom:1px solid var(--border); }
tbody tr { border-bottom:1px solid var(--border); transition:background 0.2s; animation:rowIn 0.3s ease; }
tbody tr:hover { background:rgba(59,130,246,0.04); }
tbody tr:last-child { border-bottom:none; }
@keyframes rowIn { from{opacity:0;transform:translateX(-6px);} to{opacity:1;transform:translateX(0);} }
td { padding:14px 20px; font-size:13px; }
.td-merchant { font-weight:600; }
.td-category { font-size:12px; color:var(--text-dim); font-family:'Space Mono',monospace; }
.td-amount { font-family:'Space Mono',monospace; font-weight:700; }
.td-time { font-size:11px; color:var(--text-dim); font-family:'Space Mono',monospace; }
.td-risk { font-family:'Space Mono',monospace; font-size:12px; }

/* STATUS BADGE */
.badge { font-size:10px; font-family:'Space Mono',monospace; padding:3px 10px; border-radius:20px; font-weight:700; display:inline-flex; align-items:center; gap:5px; }
.badge.fraud { background:rgba(239,68,68,0.12); color:var(--danger); border:1px solid rgba(239,68,68,0.25); }
.badge.safe  { background:rgba(16,185,129,0.12); color:var(--success); border:1px solid rgba(16,185,129,0.25); }
.badge.warn  { background:rgba(245,158,11,0.12); color:var(--warn); border:1px solid rgba(245,158,11,0.25); }

/* STATUS DOT */
.dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
.dot.fraud { background:var(--danger); box-shadow:0 0 5px var(--danger); }
.dot.safe  { background:var(--success); box-shadow:0 0 5px var(--success); }
.dot.warn  { background:var(--warn); box-shadow:0 0 5px var(--warn); }

/* RISK BAR */
.risk-bar-wrap { display:flex; align-items:center; gap:8px; }
.risk-bar { width:60px; height:4px; background:var(--text-muted); border-radius:2px; overflow:hidden; }
.risk-fill { height:100%; border-radius:2px; }

/* EMPTY */
.empty { padding:60px 20px; text-align:center; color:var(--text-muted); font-family:'Space Mono',monospace; font-size:12px; }
.empty-icon { font-size:36px; display:block; margin-bottom:12px; }

/* FILTER ROW */
.filter-row { display:flex; gap:8px; align-items:center; }
.filter-btn { padding:5px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text-dim); font-size:11px; font-family:'Space Mono',monospace; cursor:pointer; transition:all 0.2s; }
.filter-btn:hover, .filter-btn.active { background:rgba(59,130,246,0.1); color:var(--accent); border-color:rgba(59,130,246,0.3); }
.filter-btn.fraud.active { background:rgba(239,68,68,0.1); color:var(--danger); border-color:rgba(239,68,68,0.3); }
.filter-btn.safe.active  { background:rgba(16,185,129,0.1); color:var(--success); border-color:rgba(16,185,129,0.3); }
.filter-btn.warn.active  { background:rgba(245,158,11,0.1); color:var(--warn); border-color:rgba(245,158,11,0.3); }

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--text-muted); border-radius:3px; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <div class="logo-icon">🧠</div>
    <div>
      <div class="logo-text">FRAUDSHIELD AI</div>
      <div class="logo-sub">Transaction History</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-csv" onclick="downloadCSV()">⬇ Download CSV</button>
    <!-- ✅ FIXED: uses /dashboard not dashboard.html -->
    <a href="/dashboard" class="btn btn-back">← Back to Dashboard</a>
  </div>
</header>

<div class="main">

  <!-- PAGE TITLE -->
  <div class="page-title">
    <div>
      <h2>📁 Transaction Log</h2>
      <div class="page-title-sub" id="subTitle">Loading transactions...</div>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="filterTable('all', this)">All</button>
      <button class="filter-btn fraud" onclick="filterTable('fraud', this)">🚨 Fraud</button>
      <button class="filter-btn warn"  onclick="filterTable('warn', this)">⚠️ Suspicious</button>
      <button class="filter-btn safe"  onclick="filterTable('safe', this)">✅ Safe</button>
    </div>
  </div>

  <!-- SUMMARY CARDS -->
  <div class="summary-row">
    <div class="sum-card">
      <div class="sum-label">📋 TOTAL</div>
      <div class="sum-value" id="sumTotal">0</div>
    </div>
    <div class="sum-card">
      <div class="sum-label" style="color:var(--danger)">🚨 FRAUD</div>
      <div class="sum-value" id="sumFraud" style="color:var(--danger)">0</div>
    </div>
    <div class="sum-card">
      <div class="sum-label" style="color:var(--warn)">⚠️ SUSPICIOUS</div>
      <div class="sum-value" id="sumWarn" style="color:var(--warn)">0</div>
    </div>
    <div class="sum-card">
      <div class="sum-label" style="color:var(--success)">✅ SAFE</div>
      <div class="sum-value" id="sumSafe" style="color:var(--success)">0</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">All Transactions</div>
      <div class="panel-badge" id="tableCount">0 records</div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Status</th>
            <th>Merchant</th>
            <th>Category</th>
            <th>Amount (₹)</th>
            <th>Risk Score</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="6">
              <div class="empty">
                <span class="empty-icon">📂</span>
                Loading transactions...
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
let allTransactions = [];
let currentFilter = 'all';

// Load from server (Flask API)
async function loadTransactions() {
  try {
    const r = await fetch('/get_transactions');
    const data = await r.json();
    allTransactions = data;
    updateSummary();
    renderTable('all');
    document.getElementById('subTitle').textContent =
      `${data.length} transaction${data.length !== 1 ? 's' : ''} found`;
  } catch(e) {
    // Fallback: try localStorage for old data
    const saved = JSON.parse(localStorage.getItem('transactions') || '[]');
    allTransactions = saved.map(t => ({
      merchant: t.merchant || '—',
      category: t.category || '—',
      amount: t.amount || 0,
      status: t.result === 'FRAUD' ? 'fraud' : 'safe',
      risk: t.result === 'FRAUD' ? 90 : 20,
      timestamp: t.time || '—'
    }));
    updateSummary();
    renderTable('all');
    document.getElementById('subTitle').textContent =
      `${allTransactions.length} transaction(s) loaded`;
  }
}

function updateSummary() {
  const total = allTransactions.length;
  const fraud = allTransactions.filter(t => t.status === 'fraud').length;
  const warn  = allTransactions.filter(t => t.status === 'warn').length;
  const safe  = allTransactions.filter(t => t.status === 'safe').length;
  document.getElementById('sumTotal').textContent = total;
  document.getElementById('sumFraud').textContent = fraud;
  document.getElementById('sumWarn').textContent  = warn;
  document.getElementById('sumSafe').textContent  = safe;
}

function renderTable(filter) {
  currentFilter = filter;
  const tbody = document.getElementById('tableBody');
  const filtered = filter === 'all'
    ? allTransactions
    : allTransactions.filter(t => t.status === filter);

  document.getElementById('tableCount').textContent = filtered.length + ' records';

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><span class="empty-icon">📂</span>${
      filter === 'all' ? 'No transactions yet. Add one from the dashboard.' : 'No ' + filter + ' transactions found.'
    }</div></td></tr>`;
    return;
  }

  const getRiskColor = (risk) => {
    if (risk >= 80) return 'var(--danger)';
    if (risk >= 40) return 'var(--warn)';
    return 'var(--success)';
  };

  tbody.innerHTML = filtered.map(t => `
    <tr>
      <td>
        <span class="badge ${t.status}">
          <span class="dot ${t.status}"></span>
          ${t.status === 'warn' ? 'SUSPICIOUS' : t.status.toUpperCase()}
        </span>
      </td>
      <td class="td-merchant">${t.merchant || '—'}</td>
      <td class="td-category">${t.category || '—'}</td>
      <td class="td-amount">₹${Number(t.amount).toLocaleString('en-IN')}</td>
      <td class="td-risk">
        <div class="risk-bar-wrap">
          <div class="risk-bar">
            <div class="risk-fill" style="width:${t.risk||0}%;background:${getRiskColor(t.risk||0)}"></div>
          </div>
          <span style="color:${getRiskColor(t.risk||0)}">${t.risk || 0}</span>
        </div>
      </td>
      <td class="td-time">${t.timestamp || '—'}</td>
    </tr>`).join('');
}

function filterTable(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(filter);
}

function downloadCSV() {
  if (!allTransactions.length) { alert('No transactions to export.'); return; }
  let csv = 'Merchant,Category,Amount,Status,Risk Score,Timestamp\n';
  allTransactions.forEach(t => {
    csv += `${t.merchant},${t.category},${t.amount},${t.status},${t.risk||0},"${t.timestamp||''}"\n`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'fraudshield_history.csv';
  a.click();
}

loadTransactions();
</script>
</body>
</html>
